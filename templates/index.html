<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SceneSpeak</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <h1>SceneSpeak</h1>

  <video id="webcam" autoplay playsinline muted width="320" height="240"></video>
  <canvas id="canvas" width="320" height="240" style="display: none;"></canvas>

  <p id="status">Model ready. Point and click.</p>

  <button id="describe-btn">Describe Scene</button>
  <button id="toggle-sound">Mute</button>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
